name: "Conflict Awareness"

on:
  push:
    branches-ignore: [main]

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Merge Conflicts with Main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin main
          
          echo "Main branch ile simülasyon birleştirmesi yapılıyor..."
          
          if ! git merge origin/main --no-commit --no-ff; then
            echo "::error title=Conflict Detected::DİKKAT! kodlarınız çakışıyor. Lütfen merge işlemini yerelde yapıp çakışmayı çözün!"
            exit 1
          else
            
            if [ -f .git/MERGE_HEAD ]; then
              echo "Birleştirme durumu tespit edildi, iptal ediliyor..."
              git merge --abort
            fi
            echo "Tertemiz! Şu an main ile tam uyumlusun."
          fi
